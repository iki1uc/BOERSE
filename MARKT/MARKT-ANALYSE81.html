<div id="scan81-output" class="scan81-box">SCAN81 // waiting…</div>

<script type="module">
import { scanEVO } from "./SCAN81/scanEVO.js";

async function updateScan() {
    try {
        const data = await scanEVO();
        document.getElementById("scan81-output").textContent =
            JSON.stringify(data, null, 2);
    } catch (err) {
        document.getElementById("scan81-output").textContent =
            "SCAN81 ERROR: " + err.message;
    }
}

updateScan();
setInterval(updateScan, 1500);
</script>

<style>
.scan81-box {
    padding: 20px;
    background: #111;
    color: #fff;
    font-size: 18px;
    border: 1px solid #555;
    white-space: pre-wrap;
    border-radius: 6px;
    margin-bottom: 20px;
    font-family: monospace;
}
</style>
