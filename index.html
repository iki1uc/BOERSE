<!DOCTYPE html>
<html>
<head>
    <title>BOERSE – Mini Dashboard</title>
    <style>
        body {
            background: #111;
            color: #eee;
            font-family: Arial;
            padding: 20px;
        }
        .box {
            background: #222;
            border: 1px solid #444;
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 8px;
            font-size: 20px;
        }
        .title {
            font-size: 26px;
            margin-bottom: 10px;
            color: #0f0;
        }
    </style>
</head>
<body>

<h2>BOERSE – Mini Dashboard</h2>

<div id="markt2" class="box">
    <div class="title">Markt 2 – Altwert</div>
    <div id="m2">Lade…</div>
</div>

<div id="markt3" class="box">
    <div class="title">Markt 3 – Neuwert</div>
    <div id="m3">Lade…</div>
</div>

<div id="markt4" class="box">
    <div class="title">Markt 4 – ECO Start</div>
    <div id="m4">Lade…</div>
</div>

<script type="module">
import { marketData } from "./MARKT/marketData.js";

document.getElementById("m2").textContent =
    marketData.markt2;

document.getElementById("m3").textContent =
    marketData.markt3;

document.getElementById("m4").textContent =
    marketData.markt4.ecoStart;
</script>

</body>
</html>
