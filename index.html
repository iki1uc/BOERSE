<!DOCTYPE html>
<html>
<head>
    <title>Scan-Ghost – BOERSE Prüfer</title>
    <link rel="stylesheet" href="ghost.css">
</head>
<body>

<h2>Scan-Ghost – BOERSE Prüfer</h2>

<div id="ghost-status" class="ghost-box">Ghost Scan // waiting…</div>
<div id="boerse-status" class="ghost-box">BOERSE // waiting…</div>
<div id="markt-status" class="ghost-box">MARKT // waiting…</div>

<script type="module">
async function ghostScan() {
    try {
        // BOERSE URL
        const boerseURL = "https://iki1uc.github.io/BOERSE/";

        // BOERSE laden
        const res = await fetch(boerseURL);
        const ok = res.ok;

        document.getElementById("boerse-status").textContent =
            ok
            ? `BOERSE erreichbar ✓ (${res.status})`
            : `BOERSE Fehler ✗ (${res.status})`;

        // MARKT-Daten prüfen
        const marktURL = "https://raw.githubusercontent.com/iki1uc/BOERSE/main/MARKT/marketData.js";
        const marktRes = await fetch(marktURL);
        const marktText = await marktRes.text();

        document.getElementById("markt-status").textContent =
            marktRes.ok
            ? `MARKT-Daten geladen ✓\n${marktText}`
            : `MARKT-Daten Fehler ✗ (${marktRes.status})`;

        // Ghost-Status
        document.getElementById("ghost-status").textContent =
            "Ghost Scan abgeschlossen ✓";

    } catch (err) {
        document.getElementById("ghost-status").textContent =
            "Ghost Scan ERROR: " + err.message;
    }
}

ghostScan();
setInterval(ghostScan, 3000);
</script>

<style>
.ghost-box {
    padding: 20px;
    background: #111;
    color: #fff;
    font-size: 18px;
    border: 1px solid #555;
    white-space: pre-wrap;
    border-radius: 6px;
    margin-bottom: 20px;
    font-family: monospace;
}
</style>

</body>
</html>
